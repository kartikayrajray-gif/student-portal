<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:450px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>

</head>
<body>

<div class="container" id="loginPage">

<h2>Student Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="container" id="studentForm" style="display:none;">

<h2>Student Details Form</h2>

<input type="text" id="roll" placeholder="Roll Number">

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="father" placeholder="Father Name">

<input type="text" id="course" placeholder="Course">

<input type="text" id="branch" placeholder="Branch">

<input type="text" id="semester" placeholder="Semester">

<input type="email" id="email" placeholder="Email">

<input type="text" id="mobile" placeholder="Mobile Number">

<button onclick="submitForm()">Submit</button>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("studentForm").style.display="block";
}
else{
alert("Invalid Username or Password");
}

}

function submitForm(){

let roll=document.getElementById("roll").value;
let name=document.getElementById("name").value;

if(roll==="" || name===""){
alert("Please fill all required details");
return;
}

alert("Student Details Submitted Successfully");

}

</script>

</body>
</html>
